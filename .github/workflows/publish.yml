name: Publish

on:
  push:
    tags:
      - olos-v*

permissions: read-all

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: write # gh release create
      id-token: write # npm provenance OIDC

    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: bun --filter '@arsenstorm/olos' release:verify-tag

      - name: Publish check
        run: bun run publish:check

      - name: Debug npm auth state
        run: |
          echo "--- ~/.npmrc ---"
          cat ~/.npmrc 2>/dev/null || echo "(no ~/.npmrc)"
          echo
          echo "--- olos/.npmrc ---"
          cat olos/.npmrc 2>/dev/null || echo "(no olos/.npmrc)"
          echo
          echo "--- npm config list ---"
          npm config list
          echo
          echo "--- NODE_AUTH_TOKEN set? ---"
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "yes (len=$(printf %s "$NODE_AUTH_TOKEN" | wc -c))"
          else
            echo "no"
          fi
          echo
          echo "--- npm version ---"
          npm --version

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: olos

      - name: Verify published package
        run: bun --filter '@arsenstorm/olos' release:verify-published

      - name: Write release notes
        run: bun --filter '@arsenstorm/olos' release:notes

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file out/release/notes.md
