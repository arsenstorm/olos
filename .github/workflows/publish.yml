name: Publish

on:
  push:
    tags:
      - olos-v*

permissions: read-all

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create
      id-token: write   # npm provenance OIDC

    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Set up npm registry
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: bun --filter '@arsenstorm/olos' release:verify-tag

      - name: Publish check
        run: bun run publish:check

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
        working-directory: olos

      - name: Verify published package
        run: bun --filter '@arsenstorm/olos' release:verify-published

      - name: Write release notes
        run: bun --filter '@arsenstorm/olos' release:notes

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file out/release/notes.md
