name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun run audit

      - name: Lint
        run: bun run check

      - name: Publish check
        run: bun run publish:check

      - name: Report conformance coverage
        run: bun --filter '@arsenstorm/olos' conformance:report

      - name: Upload conformance report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: olos-conformance
          path: out/conformance/conformance.md
          if-no-files-found: error

      - name: Create package artifact
        run: bun --filter '@arsenstorm/olos' pack:artifact

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: olos-package
          path: out/package-artifacts/*.tgz
          if-no-files-found: error
