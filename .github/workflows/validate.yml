name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun run audit

      - name: Lint
        run: bun run check

      - name: Publish check
        run: bun run publish:check

      - name: Report conformance coverage
        run: bun --filter '@arsenstorm/olos' conformance:report

      - name: Upload conformance report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: olos-conformance
          path: out/conformance/conformance.md
          if-no-files-found: error

      - name: Create package artifact
        run: bun --filter '@arsenstorm/olos' pack:artifact

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: olos-package
          path: out/package-artifacts/*.tgz
          if-no-files-found: error
